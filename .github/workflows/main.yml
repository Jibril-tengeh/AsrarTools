name: Build AsrarTools

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Version stable de Node.js
        cache: 'npm'

    - name: Installation des dépendances
      run: npm install

    - name: Compilation de l'application (Vite)
      run: npm run build

    - name: Sauvegarde du dossier dist (Pour Capacitor)
      uses: actions/upload-artifact@v4
      with:
        name: build-asrar-tools
        path: dist/
